<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meteor War 🌩️</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #000;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            flex-direction: column; overflow: hidden; touch-action: none;
        }
        canvas {
            background-color: #000; border: 2px solid #00ffff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.4);
            border-radius: 10px; max-width: 100vw; max-height: 85vh;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="500" height="700"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let highScore = localStorage.getItem('meteorWarHighScore') ? parseInt(localStorage.getItem('meteorWarHighScore')) : 0;
    let gameState = 'start'; 

    // نظام الصوت الآمن
    let audioCtx;
    function safePlay(soundFunction) {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            soundFunction(audioCtx);
        } catch(e) {}
    }

    function sShoot(ac){const o=ac.createOscillator();const g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='sawtooth';o.frequency.setValueAtTime(1200,ac.currentTime);o.frequency.exponentialRampToValueAtTime(200,ac.currentTime+0.1);g.gain.setValueAtTime(0.15,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.01,ac.currentTime+0.1);o.start();o.stop(ac.currentTime+0.1);}
    function sExplosion(ac){const sr=ac.sampleRate;const l=sr*0.4;const b=ac.createBuffer(1,l,sr);const d=b.getChannelData(0);for(let i=0;i<l;i++){d[i]=Math.random()*2-1;}const n=ac.createBufferSource();n.buffer=b;const f=ac.createBiquadFilter();f.type='lowpass';f.frequency.setValueAtTime(1000,ac.currentTime);f.frequency.exponentialRampToValueAtTime(100,ac.currentTime+0.4);const g=ac.createGain();g.gain.setValueAtTime(0.6,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.01,ac.currentTime+0.4);n.connect(f);f.connect(g);g.connect(ac.destination);n.start();n.stop(ac.currentTime+0.4);}
    function sBossExplosion(ac){const sr=ac.sampleRate;const l=sr*0.8;const b=ac.createBuffer(1,l,sr);const d=b.getChannelData(0);for(let i=0;i<l;i++){d[i]=Math.random()*2-1;}const n=ac.createBufferSource();n.buffer=b;const f=ac.createBiquadFilter();f.type='lowpass';f.frequency.setValueAtTime(800,ac.currentTime);const g=ac.createGain();g.gain.setValueAtTime(1.0,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.01,ac.currentTime+0.8);n.connect(f);f.connect(g);g.connect(ac.destination);n.start();n.stop(ac.currentTime+0.8);}
    function sHit(ac){const sr=ac.sampleRate;const l=sr*0.15;const b=ac.createBuffer(1,l,sr);const d=b.getChannelData(0);for(let i=0;i<l;i++){d[i]=Math.random()*2-1;}const n=ac.createBufferSource();n.buffer=b;const f=ac.createBiquadFilter();f.type='highpass';f.frequency.setValueAtTime(1000,ac.currentTime);const g=ac.createGain();g.gain.setValueAtTime(0.3,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.01,ac.currentTime+0.15);n.connect(f);f.connect(g);g.connect(ac.destination);n.start();n.stop(ac.currentTime+0.15);}
    function sMega(ac){const sr=ac.sampleRate;const l=sr*1.5;const b=ac.createBuffer(1,l,sr);const d=b.getChannelData(0);for(let i=0;i<l;i++){d[i]=Math.random()*2-1;}const n=ac.createBufferSource();n.buffer=b;const f=ac.createBiquadFilter();f.type='lowpass';f.frequency.setValueAtTime(500,ac.currentTime);const g=ac.createGain();g.gain.setValueAtTime(1.2,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.01,ac.currentTime+1.5);n.connect(f);f.connect(g);g.connect(ac.destination);n.start();n.stop(ac.currentTime+1.5);}
    function sLevelUp(ac){const o=ac.createOscillator();const g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='sine';o.frequency.setValueAtTime(400,ac.currentTime);o.frequency.setValueAtTime(600,ac.currentTime+0.1);o.frequency.setValueAtTime(800,ac.currentTime+0.2);g.gain.setValueAtTime(0.2,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.01,ac.currentTime+0.4);o.start();o.stop(ac.currentTime+0.4);}
    function sPickup(ac){const o=ac.createOscillator();const g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='sine';o.frequency.setValueAtTime(800,ac.currentTime);o.frequency.exponentialRampToValueAtTime(1600,ac.currentTime+0.2);g.gain.setValueAtTime(0.2,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.01,ac.currentTime+0.2);o.start();o.stop(ac.currentTime+0.2);}

    let player = { x: 230, y: 600, width: 40, height: 50, speed: 6 };
    let bullets = []; let meteors = []; let particles = []; let pickups = [];
    let score = 0; let level = 1; let lives = 3; let megaBlastEnergy = 0;
    let keys = {}; let stars = [];
    let isBreakTime = false; let breakTimer = 0; 
    let currentLevelTarget = 100; let currentLevelStartScore = 0;
    let screenShake = 0; let flashAlpha = 0;

    const levelColors = [
        { bg1: "#000428", bg2: "#004e92", star: "#ffffff" }, { bg1: "#001a00", bg2: "#004e00", star: "#88ff88" },
        { bg1: "#1a002e", bg2: "#4e008a", star: "#e0b0ff" }, { bg1: "#2e1a00", bg2: "#8a5200", star: "#ffd700" },
        { bg1: "#2e0000", bg2: "#8a0000", star: "#ff4444" },
    ];

    for(let i=0; i<150; i++) { stars.push({ x: Math.random()*500, y: Math.random()*700, size: Math.random()*2+1, speed: Math.random()*0.5+0.1 }); }

    function resetGameVariables() {
        player = { x: 230, y: 600, width: 40, height: 50, speed: 6 }; bullets = []; meteors = []; particles = []; pickups = [];
        score = 0; level = 1; lives = 3; megaBlastEnergy = 0; isBreakTime = false; breakTimer = 0;
        currentLevelTarget = 100; currentLevelStartScore = 0; screenShake = 0; flashAlpha = 0;
    }

    window.addEventListener("keydown", (e) => {
        keys[e.code] = true;
        if(gameState === 'start' || gameState === 'gameover') {
            if (e.code === "Enter" || e.code === "Space") { gameState = 'playing'; resetGameVariables(); }
            return; 
        }
        if (e.code === "Escape" && gameState === 'playing' && !isBreakTime) { gameState = 'paused'; return; }
        if (e.code === "Escape" && gameState === 'paused') { gameState = 'playing'; return; }
        if (e.code === "Space" && gameState === 'playing' && !isBreakTime) shoot();
        if (e.code === "KeyE" && gameState === 'playing' && megaBlastEnergy >= 600) activateMegaBlast();
    });
    window.addEventListener("keyup", (e) => { keys[e.code] = false; });

    // تحكم اللمس للموبايل
    let touchStartX = 0; let touchStartY = 0;
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect(); const scaleX = canvas.width / rect.width; const scaleY = canvas.height / rect.height;
        const touchX = (e.touches[0].clientX - rect.left) * scaleX; const touchY = (e.touches[0].clientY - rect.top) * scaleY;

        if(gameState === 'start' || gameState === 'gameover') { gameState = 'playing'; resetGameVariables(); return; }
        if (touchX > 430 && touchX < 490 && touchY > 10 && touchY < 50) {
            if(gameState === 'playing') gameState = 'paused'; else if(gameState === 'paused') gameState = 'playing'; return;
        }
        if (gameState === 'playing' && megaBlastEnergy >= 600 && touchX > 370 && touchX < 490 && touchY > 640 && touchY < 690) { activateMegaBlast(); return; }
        if (gameState === 'playing') { shoot(); touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; }
    });
    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault(); if (gameState !== 'playing') return;
        let touchX = e.touches[0].clientX; let touchY = e.touches[0].clientY;
        player.x += (touchX - touchStartX) * 1.2; player.y += (touchY - touchStartY) * 1.2;
        if(player.x < 0) player.x = 0; if(player.x > canvas.width - player.width) player.x = canvas.width - player.width;
        if(player.y < 0) player.y = 0; if(player.y > canvas.height - player.height) player.y = canvas.height - player.height;
        touchStartX = touchX; touchStartY = touchY;
    });

    function shoot() { bullets.push({ x: player.x + player.width / 2 - 3, y: player.y, width: 6, height: 15, speed: 8 }); safePlay(sShoot); flashAlpha = 0.1; }

    function activateMegaBlast() {
        megaBlastEnergy = 0; safePlay(sMega); flashAlpha = 1.0; screenShake = 30;
        for (let i = meteors.length - 1; i >= 0; i--) { let m = meteors[i]; createExplosion(m.x + m.width/2, m.y + m.height/2, m.isBoss); score += m.points; if (m.width >= 50 && !m.isBoss && !m.isFragment) spawnFragments(m); meteors.splice(i, 1); }
        particles.push({ x: 250, y: 350, vx: 0, vy: 0, life: 40, color: "#00ffff", size: 500, isMega: true }); checkLevelUp();
    }

    function spawnFragments(m) { for(let k=0; k<2; k++) { meteors.push({ x: m.x + (k===0?-10:20), y: m.y, width: 20, height: 20, speed: m.speed+2, rotation: 0, rotSpeed: (Math.random()-0.5)*0.2, isBoss: false, points: 10, isFragment: true }); } }

    function spawnMeteor() {
        if (isBreakTime) return; 
        let spawnRate = 0.025 + (level * 0.01); 
        if(Math.random() < spawnRate) {
            let sizeType = Math.random(); let size, points, speed;
            if(sizeType < 0.5) { size = 20; points = 10; speed = Math.random()*2+2.5+(level*0.3); }
            else if(sizeType < 0.85) { size = 35; points = 20; speed = Math.random()*2+1.5+(level*0.3); }
            else { size = 50; points = 30; speed = Math.random()*2+1+(level*0.3); }
            meteors.push({ x: Math.random()*(canvas.width-size), y: -size, width: size, height: size, speed: speed, rotation: 0, rotSpeed: (Math.random()-0.5)*0.1, isBoss: false, points: points, isFragment: false });
        }
        if (level % 5 === 0 && Math.random() < 0.008 && !meteors.some(m => m.isBoss)) {
            let bossLevel = Math.floor(level / 5); let bossSize = 70 + (bossLevel * 15); let bossHP = 3 + bossLevel * 2; 
            meteors.push({ x: canvas.width/2-bossSize/2, y: -bossSize, width: bossSize, height: bossSize, speed: 1, rotation: 0, rotSpeed: 0.02, isBoss: true, points: 50*bossLevel, hp: bossHP, maxHp: bossHP, isFragment: false }); safePlay(sHit);
        }
        if (level % 5 === 0 && Math.random() < 0.002 && pickups.length === 0) { pickups.push({ x: Math.random()*440+30, y: -30, width: 30, height: 30, speed: 2 }); }
    }

    function drawPlayer() {
        ctx.save(); ctx.translate(player.x + player.width / 2, player.y + player.height / 2);
        let flameSize = isBreakTime ? 5 : 15; ctx.fillStyle = "#ff4500"; ctx.shadowBlur = 20; ctx.shadowColor = "#ff4500";
        ctx.beginPath(); ctx.moveTo(-10, player.height/2); ctx.lineTo(10, player.height/2); ctx.lineTo(0, player.height/2 + flameSize + Math.random()*8); ctx.fill(); ctx.shadowBlur = 0;
        ctx.fillStyle = lives > 1 ? "#00ffff" : "#ff0000"; ctx.shadowBlur = 20; ctx.shadowColor = ctx.fillStyle;
        ctx.beginPath(); ctx.moveTo(0, -player.height/2); ctx.lineTo(-player.width/2, player.height/2); ctx.lineTo(0, player.height/2 - 10); ctx.lineTo(player.width/2, player.height/2); ctx.closePath(); ctx.fill(); ctx.shadowBlur = 0; ctx.restore();
    }

    function drawMeteor(m) {
        ctx.save(); ctx.translate(m.x + m.width/2, m.y + m.height/2); ctx.rotate(m.rotation);
        if(m.isBoss) {
            ctx.fillStyle = Math.random() > 0.5 ? "#ff0000" : "#8a0000"; ctx.strokeStyle = "#ffeb3b"; ctx.lineWidth = 4; ctx.shadowBlur = 30; ctx.shadowColor = "#ff0000";
            ctx.beginPath(); for(let i=0; i<8; i++) { let a=(i/8)*Math.PI*2; let r=m.width/2*(i%2===0?1:0.7); i===0?ctx.moveTo(r*Math.cos(a),r*Math.sin(a)):ctx.lineTo(r*Math.cos(a),r*Math.sin(a)); }
            ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.shadowBlur = 0; ctx.fillStyle = "#000"; ctx.font = `bold ${m.width/3}px Arial`; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText("X", 0, 0);
            let bw = m.width; ctx.fillStyle = "#555"; ctx.fillRect(-bw/2, -m.height/2-15, bw, 8); ctx.fillStyle = "#ff0000"; ctx.fillRect(-bw/2, -m.height/2-15, bw*(m.hp/m.maxHp), 8); ctx.strokeStyle = "#fff"; ctx.lineWidth = 1; ctx.strokeRect(-bw/2, -m.height/2-15, bw, 8);
        } else { ctx.fillStyle = m.isFragment ? "#9a9a9a" : (m.width > 40 ? "#7a7a7a" : "#8a8a8a"); ctx.strokeStyle = "#555"; ctx.lineWidth = 2; ctx.shadowBlur = 10; ctx.shadowColor = "#ff0000"; ctx.beginPath(); ctx.moveTo(-m.width/3,-m.height/2); ctx.lineTo(m.width/3,-m.height/2); ctx.lineTo(m.width/2,-m.height/4); ctx.lineTo(m.width/2,m.height/4); ctx.lineTo(m.width/3,m.height/2); ctx.lineTo(-m.width/3,m.height/2); ctx.lineTo(-m.width/2,m.height/4); ctx.lineTo(-m.width/2,-m.height/4); ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.shadowBlur = 0; if(!m.isFragment){ctx.fillStyle="#666";ctx.beginPath();ctx.arc(-5,-5,m.width/6,0,Math.PI*2);ctx.fill();} }
        ctx.restore();
    }

    function createExplosion(x, y, isBoss) { let pC=isBoss?60:20; for(let i=0;i<pC;i++){let a=Math.random()*Math.PI*2;let s=(isBoss?14:8)*Math.random();particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:30+Math.random()*20,color:Math.random()>0.5?"#ff4500":"#ffeb3b",size:Math.random()*(isBoss?6:3)+2,isMega:false,type:'fire'});} for(let i=0;i<5;i++){particles.push({x,y,vx:(Math.random()-0.5)*10,vy:(Math.random()-0.5)*10,life:10,color:"#ffffff",size:1,isMega:false,type:'spark'});} }
    function updateParticles() { for(let i=particles.length-1;i>=0;i--){let p=particles[i];if(p.isMega){ctx.globalAlpha=p.life/40;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size*(1-p.life/40),0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;p.life--;}else{p.x+=p.vx;p.y+=p.vy;p.life--;p.vx*=0.98;p.vy*=0.98;ctx.globalAlpha=p.life/50;if(p.type==='spark'){ctx.fillStyle="#fff";ctx.fillRect(p.x,p.y,p.size,p.size);}else{ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;} if(p.life<=0)particles.splice(i,1);} }
    function updateBullets() { for(let i=bullets.length-1;i>=0;i--){let b=bullets[i];b.y-=b.speed;ctx.fillStyle="#ffeb3b";ctx.shadowBlur=10;ctx.shadowColor="#ffeb3b";ctx.fillRect(b.x,b.y,b.width,b.height);ctx.fillStyle="#ff4500";ctx.fillRect(b.x+1,b.y+b.height,b.width-2,5);ctx.shadowBlur=0;if(b.y<0)bullets.splice(i,1);} }
    function updatePickups() { for(let i=pickups.length-1;i>=0;i--){let p=pickups[i];p.y+=p.speed;ctx.fillStyle="#00ffff";ctx.shadowBlur=20;ctx.shadowColor="#00ffff";ctx.font="30px Arial";ctx.textAlign="center";ctx.fillText("❤️",p.x+p.width/2,p.y+p.height/2+8);ctx.shadowBlur=0;if(p.y>canvas.height){pickups.splice(i,1);continue;}if(detectCollision(player,p)){if(lives<5)lives++;safePlay(sPickup);flashAlpha=0.2;pickups.splice(i,1);}} }
    
    function checkLevelUp() { if(score>=currentLevelTarget){level++;currentLevelStartScore=currentLevelTarget;currentLevelTarget+=(level*100);isBreakTime=true;breakTimer=300;safePlay(sLevelUp);} }

    function updateMeteors() {
        for(let i=meteors.length-1;i>=0;i--){let m=meteors[i];m.y+=m.speed;m.rotation+=m.rotSpeed;drawMeteor(m);if(m.y>canvas.height+50){meteors.splice(i,1);continue;}
        if(!isBreakTime&&detectCollision(player,m)){lives--;safePlay(sExplosion);screenShake=15;flashAlpha=0.5;createExplosion(player.x+player.width/2,player.y+player.height/2,false);meteors.splice(i,1);if(lives<=0){gameState='gameover';if(score>highScore){highScore=score;localStorage.setItem('meteorWarHighScore',highScore);}}else{isBreakTime=true;breakTimer=60;}continue;}
        for(let j=bullets.length-1;j>=0;j--){let b=bullets[j];if(b&&detectCollision(b,m)){bullets.splice(j,1);if(m.isBoss){m.hp--;createExplosion(b.x+b.width/2,b.y,false);safePlay(sHit);screenShake=5;if(m.hp<=0){createExplosion(m.x+m.width/2,m.y+m.height/2,true);safePlay(sBossExplosion);screenShake=20;flashAlpha=0.4;score+=m.points;megaBlastEnergy+=m.points;meteors.splice(i,1);}}else{createExplosion(m.x+m.width/2,m.y+m.height/2,false);safePlay(sExplosion);screenShake=3;flashAlpha=0.1;score+=m.points;megaBlastEnergy+=m.points;if(m.width>=50&&!m.isFragment)spawnFragments(m);meteors.splice(i,1);}if(megaBlastEnergy>600)megaBlastEnergy=600;checkLevelUp();break;}}}
    }

    function detectCollision(r1,r2){return r1.x<r2.x+r2.width&&r1.x+r1.width>r2.x&&r1.y<r2.y+r2.height&&r1.y+r1.height>r2.y;}

    function drawStarsAndBg() { let ci=(level-1)%5;let lc=levelColors[ci];let g=ctx.createLinearGradient(0,0,0,canvas.height);g.addColorStop(0,lc.bg1);g.addColorStop(1,lc.bg2);ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle=lc.star;for(let i=0;i<stars.length;i++){let s=stars[i];if(gameState==='playing'){s.y+=s.speed;if(s.y>canvas.height){s.y=0;s.x=Math.random()*canvas.width;}}ctx.globalAlpha=Math.random()*0.5+0.5;ctx.fillRect(s.x,s.y,s.size,s.size);}ctx.globalAlpha=1; }

    function drawUI() {
        ctx.fillStyle="rgba(0,0,0,0.7)";ctx.fillRect(canvas.width/2-80,10,160,40);ctx.strokeStyle="#00ffff";ctx.lineWidth=2;ctx.strokeRect(canvas.width/2-80,10,160,40);ctx.fillStyle="#00ffff";ctx.font="bold 24px Arial";ctx.textAlign="center";ctx.fillText("SCORE: "+score,canvas.width/2,40);
        let pw=150,ph=10,px=canvas.width/2-75,py=55;ctx.fillStyle="#333";ctx.fillRect(px,py,pw,ph);let pr=(score-currentLevelStartScore)/(currentLevelTarget-currentLevelStartScore);if(pr>1)pr=1;ctx.fillStyle="#00ffff";ctx.fillRect(px,py,pw*pr,ph);ctx.strokeStyle="#00ffff";ctx.strokeRect(px,py,pw,ph);
        ctx.fillStyle="rgba(0,0,0,0.7)";ctx.fillRect(10,10,140,40);ctx.strokeStyle=level%5===0?"#ff0000":"#ffeb3b";ctx.lineWidth=2;ctx.strokeRect(10,10,140,40);ctx.fillStyle=level%5===0?"#ff0000":"#ffeb3b";ctx.font="bold 24px Arial";ctx.textAlign="center";ctx.fillText("LEVEL: "+level,80,40);
        ctx.textAlign="left";ctx.font="25px Arial";for(let i=0;i<lives;i++){ctx.fillText("❤️",10+i*30,85);}
        ctx.fillStyle="rgba(0,0,0,0.7)";ctx.fillRect(10,95,150,20);ctx.strokeStyle=megaBlastEnergy>=600?"#ff4500":"#555";ctx.lineWidth=2;ctx.strokeRect(10,95,150,20);ctx.fillStyle=megaBlastEnergy>=600?"#ff4500":"#ff8c00";ctx.fillRect(12,97,146*(megaBlastEnergy/600),16);ctx.fillStyle="white";ctx.font="bold 14px Arial";ctx.textAlign="center";ctx.fillText(megaBlastEnergy>=600?"PRESS E TO BLAST!":"ENERGY: "+megaBlastEnergy+"/600",85,110);

        ctx.fillStyle = "rgba(255,255,255,0.3)"; ctx.font = "30px Arial"; ctx.textAlign = "center";
        ctx.fillRect(440, 10, 50, 40); ctx.fillStyle = "#000"; ctx.fillText("⏸", 465, 40);
        
        if(megaBlastEnergy >= 600) {
            ctx.fillStyle = "rgba(255,69,0,0.6)"; ctx.fillRect(370, 640, 120, 50);
            ctx.strokeStyle = "#ffeb3b"; ctx.lineWidth = 2; ctx.strokeRect(370, 640, 120, 50);
            ctx.fillStyle = "#fff"; ctx.font = "bold 20px Arial"; ctx.fillText("MEGA 💥", 430, 670);
        }
    }

    function drawScreens() {
        drawStarsAndBg();
        if(gameState==='start'){
            ctx.fillStyle="rgba(0, 5, 20, 0.85)";ctx.fillRect(0,0,canvas.width,canvas.height);ctx.textAlign="center";
            
            // اسم اللعبة Meteor War
            ctx.fillStyle="#ff4500"; ctx.shadowBlur=30; ctx.shadowColor="#ff4500";
            ctx.font="bold 70px Arial"; ctx.fillText("METEOR", canvas.width/2, 180);
            ctx.fillStyle="#00ffff"; ctx.shadowColor="#00ffff";
            ctx.font="bold 80px Arial"; ctx.fillText("WAR", canvas.width/2, 270);
            ctx.shadowBlur=0;
            
            ctx.fillStyle="#ffeb3b";ctx.font="bold 22px Arial";ctx.fillText("High Score: "+highScore,canvas.width/2,340);
            
            ctx.fillStyle="white";ctx.font="20px Arial";
            ctx.fillText("⬆️⬇️⬅️➡️ or Swipe to Move",canvas.width/2,420);
            ctx.fillText("Space or Tap to Shoot",canvas.width/2,460);
            ctx.fillText("E or Button for Mega Blast",canvas.width/2,500);
            
            ctx.fillStyle="#ff4500";ctx.font="bold 28px Arial";ctx.fillText("Press Enter or Tap to Start",canvas.width/2,600);
        }
        else if(gameState==='paused'){
            ctx.fillStyle="rgba(0,0,0,0.7)";ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle="white";ctx.font="bold 70px Arial";ctx.textAlign="center";ctx.fillText("⏸",canvas.width/2,canvas.height/2-20);ctx.font="bold 30px Arial";ctx.fillText("PAUSED",canvas.width/2,canvas.height/2+30);ctx.font="20px Arial";ctx.fillStyle="#aaa";ctx.fillText("Press Esc to Resume",canvas.width/2,canvas.height/2+70);
        }
        else if(gameState==='gameover'){
            ctx.fillStyle="rgba(0,0,0,0.85)";ctx.fillRect(0,0,canvas.width,canvas.height);ctx.textAlign="center";
            ctx.fillStyle="white";ctx.font="bold 60px Arial";ctx.shadowBlur=30;ctx.shadowColor="red";ctx.fillText("GAME OVER",canvas.width/2,250);ctx.shadowBlur=0;
            ctx.font="bold 30px Arial";ctx.fillStyle="#00ffff";ctx.fillText("Score: "+score,canvas.width/2,340);
            ctx.fillStyle="#ffeb3b";ctx.fillText("Level: "+level,canvas.width/2,390);
            if(score>=highScore&&score>0){ctx.fillStyle="#ff4500";ctx.font="bold 35px Arial";ctx.fillText("NEW HIGH SCORE!",canvas.width/2,450);}
            else{ctx.fillStyle="white";ctx.font="20px Arial";ctx.fillText("High Score: "+highScore,canvas.width/2,450);}
            ctx.fillStyle="#aaa";ctx.font="bold 24px Arial";ctx.fillText("Press Enter or Tap to Retry",canvas.width/2,560);
        }
    }

    function gameLoop() {
        ctx.save();
        if(screenShake>0){let sx=(Math.random()-0.5)*screenShake;let sy=(Math.random()-0.5)*screenShake;ctx.translate(sx,sy);screenShake*=0.9;if(screenShake<0.5)screenShake=0;}
        ctx.clearRect(-50,-50,canvas.width+100,canvas.height+100);

        if(gameState==='playing'){
            drawStarsAndBg();
            if(keys["ArrowUp"]&&player.y>0)player.y-=player.speed; if(keys["ArrowDown"]&&player.y<canvas.height-player.height)player.y+=player.speed; if(keys["ArrowLeft"]&&player.x>0)player.x-=player.speed; if(keys["ArrowRight"]&&player.x<canvas.width-player.width)player.x+=player.speed;
            
            if(isBreakTime){
                breakTimer--;drawPlayer();updateBullets();updateMeteors();updatePickups();updateParticles();drawUI();
                ctx.fillStyle="rgba(0,0,0,0.6)";ctx.fillRect(0,canvas.height/2-90,canvas.width,180);ctx.textAlign="center";
                if(level%5===0){ctx.fillStyle="#ff0000";ctx.font="bold 35px Arial";ctx.fillText("⚠️ DANGER ZONE ⚠️",canvas.width/2,canvas.height/2-30);}
                else{ctx.fillStyle="#00ffff";ctx.font="bold 40px Arial";ctx.fillText("LEVEL "+level,canvas.width/2,canvas.height/2-30);}
                ctx.fillStyle="white";ctx.font="bold 70px Arial";let sl=Math.ceil(breakTimer/60);ctx.fillText(sl,canvas.width/2,canvas.height/2+50);
                if(breakTimer<=0)isBreakTime=false;
            } else {
                spawnMeteor();drawPlayer();updateBullets();updateMeteors();updatePickups();updateParticles();drawUI();
            }
        } else { 
            drawScreens(); 
        }

        if(flashAlpha>0){ctx.fillStyle=`rgba(255,255,255,${flashAlpha})`;ctx.fillRect(-50,-50,canvas.width+100,canvas.height+100);flashAlpha-=0.05;}
        ctx.restore();
        requestAnimationFrame(gameLoop);
    }

    gameLoop();
</script>

</body>
</html>
